# bwssh configuration file
# Location: ${XDG_CONFIG_HOME:-~/.config}/bwssh/config.toml

[daemon]
# Runtime directory for sockets and PID file.
# Linux default: $XDG_RUNTIME_DIR/bwssh (or /tmp/bwssh-$UID if XDG_RUNTIME_DIR not set)
# macOS default: ~/Library/Caches/bwssh
# runtime_dir = "/run/user/1000/bwssh"

# Socket file names (relative to runtime_dir)
agent_socket = "agent.sock"
control_socket = "control.sock"

# Log level: DEBUG, INFO, WARNING, ERROR
log_level = "INFO"

# Auto-lock when system goes to sleep (lid close, suspend, etc.)
# Recommended: true (default)
lock_on_sleep = true

[bitwarden]
# Path to bw CLI executable
bw_path = "/usr/sbin/bw"

# Discovery mode: "explicit" (list item_ids) or "query" (future)
mode = "explicit"

# WSL mode: proxy to a Windows SSH agent via named-pipe relay.
# Requires a relay binary like npiperelay.exe in PATH.
# mode = "windows_bridge"
# windows_pipe_command = ["npiperelay.exe", "-ei", "-s", "//./pipe/openssh-ssh-agent"]
# auto_unlock_poll_seconds = 5

# Bitwarden item IDs containing SSH keys
# Get IDs from: bw list items --session <session_key>
item_ids = [
    "1fc48db0-b2a7-4eb4-9877-33847b9f3075",
]

# Query-based discovery (future, not implemented in MVP)
# mode = "query"
# query = "tag:ssh OR type:sshkey"
# collection_ids = []

[auth]
# Require polkit desktop prompts for signing?
# - false (default): Allow all local signing requests without prompts
# - true: Show desktop prompt for each sign request (requires polkit setup)
#
# To enable polkit:
# 1. Install policy: bwssh install --polkit | sudo tee /usr/share/polkit-1/actions/io.github.reidond.bwssh.policy
# 2. Set require_polkit = true
# 3. Restart daemon: bwssh stop && bwssh start
require_polkit = false

# Authorization caching mode (only used when require_polkit = true):
# - "always": prompt for every sign request
# - "per_connection": prompt once per SSH connection
# - "ttl": prompt once per key+program, cache for approval_ttl_seconds
approval_mode = "per_connection"

# TTL for "ttl" mode (seconds)
approval_ttl_seconds = 300

# Block signing requests from forwarded SSH agents.
# When you SSH with -A, remote servers can request signatures. This blocks that.
# Recommended: true (default)
deny_forwarded_by_default = true

[ssh]
# Allowed key types
allow_ed25519 = true
allow_ecdsa = true
allow_rsa = true

# Prefer RSA SHA-2 signatures (RFC 8332) when the request flags allow it.
# If false, use SHA-1 for legacy compatibility (not recommended).
prefer_rsa_sha2 = true
