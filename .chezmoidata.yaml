# ecc (Everything Claude Code) — managed by chezmoi.
# Bump `version` to upgrade; the run_onchange installer script re-runs automatically.
# See docs/superpowers/specs/2026-06-27-manage-ecc-with-chezmoi-design.md
ecc:
  version: "v2.0.0"
  profile: "full"

# hapi runner — supervised by launchd (macOS) / systemd (Linux). The run_onchange
# loader script (.chezmoiscripts/run_onchange_after_80-hapi-runner.sh.tmpl) embeds
# this version; bump it to force the agent/unit to reload after editing the plist
# or the .service file.
hapi:
  runner:
    # Relative home-dir subpaths that `hapi runner start-sync` syncs with the hub.
    # Single source of truth — consumed by the launchd plist (macOS) and the
    # systemd unit (Linux), which each expand them under their own home specifier
    # ({{ .chezmoi.homeDir }} / %h). Add a path here and both pick it up on the
    # next `chezmoi apply`.
    workspaceRoots:
      - clone
      - tmp
      - work
      - .local/share
    version: "3"

# System ssh-agent + bw-ssh-add key loader. The agent unit is enabled by
# .chezmoiscripts/run_onchange_after_81-ssh-agent.sh.tmpl; bump `version` to
# force a re-enable after editing the unit file. `keyItemIds` lists Bitwarden
# SSH-key item ids that `bw-ssh-add` loads into the agent.
ssh:
  agent:
    version: "1"
  keyItemIds:
    - "1fc48db0-b2a7-4eb4-9877-33847b9f3075"

# Claude Code third-party plugins — managed by chezmoi.
# Each plugin has a matching .chezmoiexternals/<name>.yaml.tmpl and a
# run_onchange_after_7X-<name>-install.sh.tmpl. Bump version/ref to upgrade.
plugins:
  plannotator:
    # Passed to install.sh --version and used to gate binary-layer reinstall.
    version: "0.21.3"
    # git tag/commit the external clone checks out (--branch) AND the run_onchange
    # script force-checks out. Confirmed via `git ls-remote --tags` — upstream uses
    # vX.Y.Z naming. v0.21.3 -> commit ec8342c.
    ref: "v0.21.3"
    # Sets PLANNOTATOR_SKIP_SEM_INSTALL=1 (sem code-review sidecar not currently
    # installed; toggle to false to install sem alongside the binary).
    skipSem: true
